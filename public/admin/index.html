<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
</head>
<body>
  <script>
    // Debug: verify config before CMS loads
    fetch('/admin/config.yml')
      .then(r => r.text())
      .then(config => {
        console.log('=== Decap CMS Config Debug ===');
        console.log('auth_type found:', config.includes('auth_type: pkce') ? 'pkce ✅' : 'NOT pkce ❌');
        console.log('app_id found:', config.includes('app_id:') ? config.match(/app_id:\s*(.+)/)?.[1] : 'MISSING ❌');
        console.log('local_backend:', config.includes('local_backend: true') ? 'true' : 'false');
        console.log('Full config:\n', config);
        console.log('==============================');
      });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
